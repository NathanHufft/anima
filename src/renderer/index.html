<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- three.js + three-vrm are loaded from CDN (this is a real desktop app with
       network access, so no bundler/build step is needed). -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js"
    }
  }
  </script>
</head>

<body>
  <!-- Drag handle strip (frameless window move) -->
  <div id="dragbar" aria-hidden="true"></div>

  <!-- ===================== STAGE ===================== -->
  <main id="stage">
    <!-- Signature: living aura ring behind the avatar -->
    <div id="aura"><span></span><span></span><span></span></div>

    <!-- 3D avatar -->
    <canvas id="avatar-canvas"></canvas>

    <!-- Fallback face (shown until a .vrm is loaded) -->
    <div id="fallback" hidden>
      <svg viewBox="0 0 220 240" id="face-svg">
        <defs>
          <radialGradient id="skin" cx="50%" cy="42%" r="65%">
            <stop offset="0%" stop-color="#fff4ef" />
            <stop offset="100%" stop-color="#ffe0d6" />
          </radialGradient>
          <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c9b3ff" />
            <stop offset="100%" stop-color="#8e7bd6" />
          </linearGradient>
        </defs>
        <path d="M40 120 Q30 30 110 26 Q190 30 180 120 L182 170 Q150 150 150 120 Q110 140 70 120 Q70 150 38 170 Z"
          fill="url(#hair)" />
        <ellipse cx="110" cy="128" rx="62" ry="70" fill="url(#skin)" />
        <g id="eyes">
          <ellipse class="eye" cx="86" cy="126" rx="13" ry="17" fill="#3a2b5e" />
          <ellipse class="eye" cx="134" cy="126" rx="13" ry="17" fill="#3a2b5e" />
          <circle cx="90" cy="120" r="4" fill="#fff" />
          <circle cx="138" cy="120" r="4" fill="#fff" />
        </g>
        <ellipse class="blush" cx="74" cy="150" rx="12" ry="7" fill="#ffb4c4" opacity="0.6" />
        <ellipse class="blush" cx="146" cy="150" rx="12" ry="7" fill="#ffb4c4" opacity="0.6" />
        <path id="mouth" d="M96 168 Q110 174 124 168" stroke="#c66" stroke-width="3" fill="#e98" />
        <path d="M40 120 Q60 60 110 58 Q120 92 150 88 Q170 80 180 120 L178 96 Q150 24 110 26 Q58 28 42 96 Z"
          fill="url(#hair)" />
      </svg>
    </div>

    <!-- Speech bubble -->
    <div id="bubble" class="hidden">
      <div id="bubble-text"></div>
    </div>

    <!-- Status pip -->
    <div id="status" class="idle">idle</div>
  </main>

  <!-- ===================== DOCK ===================== -->
  <div id="dock" class="interactive">
    <div id="grip" class="grip" title="Drag to move the window">⋮⋮</div> <button id="btn-settings" class="icon-btn"
      title="Settings">⚙</button>
    <input id="say" type="text" placeholder="say something to her…" autocomplete="off" />
    <button id="btn-send" class="send-btn" title="Send">➤</button> <button id="btn-mic" class="icon-btn"
      title="Talk to her (voice)">🎤</button> <button id="btn-mute" class="icon-btn" title="Mute voice">🔊</button>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
